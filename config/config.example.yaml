location:
  latitude: 0.0
  longitude: 0.0
  postal_code: "00000"
  search_radius_miles: 10

scraping:
  lookback_days: 30
  max_discovery_depth: 2
  candidate_promotion_threshold: 3

scoring:
  tiers:
    top_picks_min: 0.5
    worth_considering_min: 0.1
  summary_weight: 0.3
  match_multipliers:
    yes: 1.5
    maybe: 1.0
    no: 0.5
  min_tags_per_event: 5

deduplication:
  fuzzy_title_threshold: 0.85
  time_window_hours: 2
  semantic_threshold: 0.92

models:
  llm_extraction: "gemma4:e4b"
  llm_disambiguation: "gemma4:e2b"
  embeddings: "nomic-embed-text"

weather:
  provider: "open-meteo"

scheduling:
  run_window_start: "02:00"
  run_window_end: "04:00"
  jitter_minutes: 30

data_retention_days: 365

synthetic_activities:
  - name: "Evening walk"
    conditions:
      min_temp_f: 55
      max_temp_f: 85
      weather: [clear, partly_cloudy]
      time_window: "sunset_minus_1h to sunset_plus_2h"
    tags: [outdoor, walking, low_key]
    summary: "A pleasant evening walk"
